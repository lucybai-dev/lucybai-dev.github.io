<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">平安夜</title>
  <desc id="desc">狼队刀真平民，真守卫也守真平民，因此出现平安夜。</desc>
  <style>.bg{fill:#fafafa}.title{font:700 26px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.sub{font:400 15px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.label{font:600 17px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.small{font:400 13px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.wolf{fill:#fee2e2;stroke:#dc2626}.god{fill:#ede9fe;stroke:#7c3aed}.villager{fill:#dcfce7;stroke:#16a34a}.night{fill:#fef3c7;stroke:#d97706}.knife{stroke:#dc2626;stroke-width:3;fill:none;marker-end:url(#red)}.guard{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#purple)}.result{stroke:#d97706;stroke-width:3;fill:none;marker-end:url(#gold)}</style>
  <defs><marker id="red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker><marker id="purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker><marker id="gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker></defs>
  <rect class="bg" width="900" height="320" rx="28"/>
  <text x="50" y="55" class="title">平安夜</text>
  <text x="50" y="83" class="sub">刀口和守护，落在同一个人身上。</text>
  <circle class="wolf" cx="145" cy="180" r="52" stroke-width="3"/><text x="145" y="170" text-anchor="middle" font-size="32">🐺🐺</text><text x="145" y="203" text-anchor="middle" class="label">狼队</text>
  <circle class="villager" cx="450" cy="180" r="52" stroke-width="3"/><text x="450" y="170" text-anchor="middle" font-size="32">🙂</text><text x="450" y="203" text-anchor="middle" class="label">真平民</text>
  <circle class="god" cx="450" cy="82" r="40" stroke-width="3"/><text x="450" y="92" text-anchor="middle" font-size="30">🛡️</text>
  <circle class="night" cx="735" cy="180" r="52" stroke-width="3"/><text x="735" y="170" text-anchor="middle" font-size="32">🌙</text><text x="735" y="203" text-anchor="middle" class="label">平安夜</text>
  <path class="knife" d="M200 180 L388 180"/><text x="292" y="160" text-anchor="middle" class="small">刀</text>
  <path class="guard" d="M450 122 L450 126"/><text x="490" y="122" class="small">守</text>
  <path class="result" d="M506 180 L675 180"/>
</svg>