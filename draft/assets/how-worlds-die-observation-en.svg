<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" role="img" aria-labelledby="title desc">
  <title id="title">The Kill Target Holds</title>
  <desc id="desc">Both Guard claims report protecting the same villager, confirming the wolves' kill target.</desc>
  <style>.bg{fill:#fafafa}.title{font:700 26px ui-sans-serif,system-ui,sans-serif;fill:#111827}.sub{font:400 15px ui-sans-serif,system-ui,sans-serif;fill:#6b7280}.card{fill:#fff;stroke:#e5e7eb;stroke-width:2}.result{fill:#dcfce7;stroke:#16a34a;stroke-width:3}.label{font:700 17px ui-sans-serif,system-ui,sans-serif;fill:#111827}.quote{font:600 17px ui-sans-serif,system-ui,sans-serif;fill:#111827}.arrow{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker></defs>
  <rect class="bg" width="1080" height="360" rx="28"/>
  <text x="50" y="55" class="title">The Kill Target Holds</text>
  <text x="50" y="83" class="sub">Two opposing claims report the same kill target.</text>
  <rect class="card" x="75" y="125" width="330" height="110" rx="22"/>
  <text x="115" y="166" class="label">🛡️ Me</text>
  <text x="115" y="202" class="quote">I protected 🙂</text>
  <rect class="card" x="675" y="125" width="330" height="110" rx="22"/>
  <text x="715" y="166" class="label">🛡️ Counterclaim</text>
  <text x="715" y="202" class="quote">I also protected 🙂</text>
  <path class="arrow" d="M410 180 L465 180"/>
  <path class="arrow" d="M670 180 L615 180"/>
  <rect class="result" x="450" y="255" width="180" height="62" rx="22"/>
  <text x="540" y="293" text-anchor="middle" class="label">Target = 🙂</text>
  <path class="arrow" d="M540 190 L540 249"/>
</svg>
