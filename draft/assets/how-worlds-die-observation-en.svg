<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 340" role="img" aria-labelledby="title desc">
  <title id="title">The Kill Target Holds</title>
  <desc id="desc">Both Guard claims report protecting the same villager, confirming the wolves' kill target.</desc>
  <style>.bg{fill:#fafafa}.title{font:700 26px ui-sans-serif,system-ui,sans-serif;fill:#111827}.sub{font:400 15px ui-sans-serif,system-ui,sans-serif;fill:#6b7280}.card{fill:#fff;stroke:#e5e7eb;stroke-width:2}.result{fill:#dcfce7;stroke:#16a34a;stroke-width:3}.label{font:700 18px ui-sans-serif,system-ui,sans-serif;fill:#111827}.quote{font:600 19px ui-sans-serif,system-ui,sans-serif;fill:#111827}.small{font:400 14px ui-sans-serif,system-ui,sans-serif;fill:#6b7280}.arrow{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker></defs>
  <rect class="bg" width="980" height="340" rx="28"/>
  <text x="50" y="55" class="title">The Kill Target Holds</text>
  <text x="50" y="83" class="sub">Two opposing claims report the same kill target.</text>
  <rect class="card" x="70" y="125" width="300" height="100" rx="22"/>
  <text x="105" y="164" class="label">🛡️ Me</text>
  <text x="105" y="198" class="quote">“I protected 🙂”</text>
  <rect class="card" x="610" y="125" width="300" height="100" rx="22"/>
  <text x="645" y="164" class="label">🛡️ Counterclaim</text>
  <text x="645" y="198" class="quote">“I also protected 🙂”</text>
  <path class="arrow" d="M375 175 L430 175"/>
  <path class="arrow" d="M605 175 L550 175"/>
  <rect class="result" x="405" y="245" width="170" height="62" rx="22"/>
  <text x="490" y="283" text-anchor="middle" class="label">✓ Target = 🙂</text>
  <path class="arrow" d="M490 187 L490 239"/>
</svg>
