<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">世界为什么会死</title>
  <desc id="desc">一条世界线可能因为规则、观测、行动、收益或未来模拟冲突而被剪掉。</desc>
  <style>.bg{fill:#fafafa}.title{font:700 28px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.sub{font:400 16px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.center{fill:#fff;stroke:#111827;stroke-width:2.5}.card{fill:#fff;stroke:#e5e7eb;stroke-width:2}.dead{fill:#f3f4f6;stroke:#9ca3af;stroke-width:2}.label{font:700 18px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.small{font:400 14px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.x{font:800 18px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#991b1b}.arrow{stroke:#9ca3af;stroke-width:2.5;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/></marker></defs>
  <rect class="bg" width="980" height="430" rx="28"/>
  <text x="50" y="56" class="title">一条世界线会有很多种死法</text>
  <text x="50" y="86" class="sub">不是所有世界都死在同一个地方；不同约束会以不同方式剪枝。</text>
  <rect class="center" x="390" y="165" width="200" height="95" rx="24"/>
  <text x="490" y="205" text-anchor="middle" class="label">一条世界线</text>
  <text x="490" y="234" text-anchor="middle" class="small">World candidate</text>

  <rect class="card" x="70" y="135" width="160" height="78" rx="20"/><text x="150" y="169" text-anchor="middle" class="label">规则冲突</text><text x="150" y="194" text-anchor="middle" class="small">两个真守卫</text>
  <rect class="dead" x="70" y="242" width="160" height="52" rx="18"/><text x="150" y="274" text-anchor="middle" class="x">剪掉</text>
  <path class="arrow" d="M390 196 C330 190,285 176,237 174"/><path class="arrow" d="M150 214 L150 236"/>

  <rect class="card" x="250" y="300" width="160" height="78" rx="20"/><text x="330" y="334" text-anchor="middle" class="label">观测冲突</text><text x="330" y="359" text-anchor="middle" class="small">发言 / 投票 / 刀口</text>
  <rect class="dead" x="250" y="205" width="160" height="52" rx="18"/><text x="330" y="238" text-anchor="middle" class="x">剪掉</text>
  <path class="arrow" d="M430 260 C400 280,370 300,345 300"/><path class="arrow" d="M330 300 L330 263"/>

  <rect class="card" x="410" y="40" width="160" height="78" rx="20"/><text x="490" y="74" text-anchor="middle" class="label">行动冲突</text><text x="490" y="99" text-anchor="middle" class="small">唯一神却不刀</text>
  <rect class="dead" x="410" y="295" width="160" height="52" rx="18"/><text x="490" y="328" text-anchor="middle" class="x">剪掉</text>
  <path class="arrow" d="M490 165 L490 124"/><path class="arrow" d="M490 260 L490 289"/>

  <rect class="card" x="570" y="300" width="160" height="78" rx="20"/><text x="650" y="334" text-anchor="middle" class="label">收益冲突</text><text x="650" y="359" text-anchor="middle" class="small">残局平民跳神</text>
  <rect class="dead" x="570" y="205" width="160" height="52" rx="18"/><text x="650" y="238" text-anchor="middle" class="x">剪掉</text>
  <path class="arrow" d="M550 260 C580 280,610 300,635 300"/><path class="arrow" d="M650 300 L650 263"/>

  <rect class="card" x="750" y="135" width="160" height="78" rx="20"/><text x="830" y="169" text-anchor="middle" class="label">未来冲突</text><text x="830" y="194" text-anchor="middle" class="small">往后推必输</text>
  <rect class="dead" x="750" y="242" width="160" height="52" rx="18"/><text x="830" y="274" text-anchor="middle" class="x">剪掉</text>
  <path class="arrow" d="M590 196 C650 190,695 176,743 174"/><path class="arrow" d="M830 214 L830 236"/>
</svg>