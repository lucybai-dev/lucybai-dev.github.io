<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">推理循环</title>
  <desc id="desc">不完整信息下的推理循环：从观测开始，构造世界，剪枝，模拟，干预，再获得新的观测。</desc>
  <style>
    .bg{fill:#fafafa}.title{font:700 26px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.sub{font:400 15px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.node{fill:#fff;stroke:#e5e7eb;stroke-width:2.5}.obs{fill:#ecfeff;stroke:#0891b2}.world{fill:#f8fafc;stroke:#64748b}.prune{fill:#fee2e2;stroke:#dc2626}.sim{fill:#fef3c7;stroke:#d97706}.act{fill:#ede9fe;stroke:#7c3aed}.label{font:700 17px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.small{font:400 13px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.arrow{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}.loop{stroke:#7c3aed;stroke-width:3;fill:none;marker-end:url(#purple)}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
    <marker id="purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
  </defs>
  <rect class="bg" width="900" height="420" rx="28"/>
  <text x="50" y="55" class="title">推理循环</text>
  <text x="50" y="83" class="sub">不是一次线性判断，而是不断获得新信息、更新世界、继续剪枝。</text>

  <rect class="node obs" x="350" y="110" width="200" height="64" rx="22" stroke-width="3"/>
  <text x="450" y="138" text-anchor="middle" class="label">Observation</text>
  <text x="450" y="160" text-anchor="middle" class="small">观测</text>

  <rect class="node world" x="615" y="180" width="190" height="64" rx="22" stroke-width="3"/>
  <text x="710" y="208" text-anchor="middle" class="label">Worlds</text>
  <text x="710" y="230" text-anchor="middle" class="small">构造世界</text>

  <rect class="node prune" x="520" y="300" width="190" height="64" rx="22" stroke-width="3"/>
  <text x="615" y="328" text-anchor="middle" class="label">Prune</text>
  <text x="615" y="350" text-anchor="middle" class="small">剪枝</text>

  <rect class="node sim" x="190" y="300" width="190" height="64" rx="22" stroke-width="3"/>
  <text x="285" y="328" text-anchor="middle" class="label">Simulate</text>
  <text x="285" y="350" text-anchor="middle" class="small">向未来推</text>

  <rect class="node act" x="95" y="180" width="190" height="64" rx="22" stroke-width="3"/>
  <text x="190" y="208" text-anchor="middle" class="label">Intervene</text>
  <text x="190" y="230" text-anchor="middle" class="small">主动制造信息</text>

  <path class="arrow" d="M550 142 C610 150,650 165,690 178"/>
  <path class="arrow" d="M710 245 C700 275,670 292,640 300"/>
  <path class="arrow" d="M520 332 L388 332"/>
  <path class="arrow" d="M260 300 C230 282,205 260,195 246"/>
  <path class="loop" d="M190 180 C200 130,285 105,342 134"/>
</svg>