<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>世界是如何死去的 - Lucy Bai</title>
  <meta name="description" content="从一局狼人杀整理不完整信息下的推理过程。">
  <link rel="stylesheet" href="/style.css">
  <style>
    .figure { margin: 2rem 0; }
    .figure img { display: block; width: 100%; max-width: 980px; height: auto; border-radius: 24px; }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="logo" href="/">Lucy Bai</a>
      <nav>
        <a href="/writing.html">Notes</a>
        <a href="/projects.html">Projects</a>
      </nav>
    </header>
    <article id="post"></article>
    <noscript>
      <article>
        <p class="eyebrow">2026.06.27 · 中文 · Draft</p>
        <h1>世界是如何死去的</h1>
        <p class="intro">从一局狼人杀整理不完整信息下的推理过程。</p>
        <p><a href="/draft/20260627-how-worlds-die-zh.md">Read the Markdown source</a></p>
      </article>
    </noscript>
  </main>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    const src = '/draft/20260627-how-worlds-die-zh.md';
    const post = document.getElementById('post');
    const mapTitle = '目录';
    const langSwitch = '';
    function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}
    function inline(s){return escapeHtml(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');}
    function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'-').replace(/^-+|-+$/g,'');}
    function mapLabel(h){return h;}
    function render(md){
      const lines = md.split(/\r?\n/);
      const headings = lines.filter(l=>l.trim().startsWith('## ')).map(l=>l.trim().slice(3));
      const used = {};
      const ids = headings.map(h=>{let base=slugify(h)||'section';let id=base;used[base]=(used[base]||0)+1;if(used[base]>1)id=base+'-'+used[base];return id;});
      const toc = '<nav class="toc"><p class="toc-title">'+mapTitle+'</p>'+headings.map((h,i)=>'<a href="#'+ids[i]+'">'+inline(mapLabel(h))+'</a>').join('')+'</nav>';
      let html = '<p class="eyebrow">2026.06.27 · 中文 · Draft'+(langSwitch ? ' · '+langSwitch : '')+'</p>';
      let para = [], quote = [], h2Index = 0, seenH1 = false, insertedToc = false, usedIntro = false;
      let inFence = false, fenceLang = '', fenceLines = [];
      function maybeToc(){ if(seenH1 && usedIntro && !insertedToc){ html += toc; insertedToc = true; } }
      function flushPara(){ if(para.length){ html += '<p>'+inline(para.join(' '))+'</p>'; para=[]; maybeToc(); } }
      function flushQuote(){ if(quote.length){ html += '<blockquote><p>'+quote.map(inline).join('<br>')+'</p></blockquote>'; quote=[]; maybeToc(); } }
      function flushFence(){
        const code = fenceLines.join('\n');
        if(fenceLang === 'mermaid') html += '<div class="mermaid">'+escapeHtml(code)+'</div>';
        else html += '<pre><code>'+escapeHtml(code)+'</code></pre>';
        inFence = false; fenceLang = ''; fenceLines = []; maybeToc();
      }
      for(const raw of lines){
        const line = raw.trim();
        if(inFence){
          if(line.startsWith('```')){ flushFence(); continue; }
          fenceLines.push(raw); continue;
        }
        if(line.startsWith('```')){ flushPara(); flushQuote(); inFence = true; fenceLang = line.replace(/^```/,'').trim(); fenceLines=[]; continue; }
        if(!line){ flushPara(); flushQuote(); continue; }
        const img = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if(img){ flushPara(); flushQuote(); html += '<figure class="figure"><img src="'+escapeAttr(img[2])+'" alt="'+escapeAttr(img[1])+'"></figure>'; maybeToc(); continue; }
        if(line.startsWith('>')){ flushPara(); quote.push(line.replace(/^>\s?/,'')); continue; }
        flushQuote();
        if(line.startsWith('# ')){ flushPara(); html += '<h1>'+inline(line.slice(2))+'</h1>'; seenH1 = true; continue; }
        if(seenH1 && !usedIntro && /^\*[^*]+\*$/.test(line)){ flushPara(); html += '<p class="intro">'+inline(line.replace(/^\*|\*$/g,''))+'</p>'; usedIntro = true; maybeToc(); continue; }
        if(line.startsWith('## ')){ flushPara(); const title=line.slice(3); html += '<h2 id="'+ids[h2Index++]+'">'+inline(title)+'</h2>'; continue; }
        para.push(line);
      }
      if(inFence) flushFence();
      flushPara(); flushQuote();
      if(!insertedToc) html += toc;
      post.innerHTML = html;
      mermaid.run({ querySelector: '.mermaid' });
    }
    fetch(src).then(r=>r.text()).then(render).catch(()=>{post.innerHTML='<p>Unable to load draft.</p>';});
  </script>
</body>
</html>
