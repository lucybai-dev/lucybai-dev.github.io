<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Preview - Lucy Bai</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/style.css">
  <style>
    .figure { margin: 2rem 0; }
    .figure img { display: block; width: 100%; max-width: 980px; height: auto; border-radius: 24px; }
    .draft-error { border-top:1px solid var(--line); padding-top:20px; color:var(--muted); }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="logo" href="/">Lucy Bai</a>
      <nav>
        <a href="/writing.html">Notes</a>
        <a href="/projects.html">Projects</a>
      </nav>
    </header>
    <article id="post"><p>Loading draft…</p></article>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    const post = document.getElementById('post');

    function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}
    function inline(s){return escapeHtml(s)
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>');}
    function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'-').replace(/^-+|-+$/g,'');}
    function dateFromFile(name){
      const m = name.match(/^(\d{4})(\d{2})(\d{2})-/);
      return m ? `${m[1]}.${m[2]}.${m[3]}` : 'Draft';
    }
    function render(md){
      const lines = md.split(/\r?\n/);
      const headings = lines.filter(l=>l.trim().startsWith('## ')).map(l=>l.trim().slice(3));
      const used = {};
      const ids = headings.map(h=>{let base=slugify(h)||'section';let id=base;used[base]=(used[base]||0)+1;if(used[base]>1)id=base+'-'+used[base];return id;});
      const toc = headings.length ? '<nav class="toc"><p class="toc-title">Map</p>'+headings.map((h,i)=>'<a href="#'+ids[i]+'">'+inline(h)+'</a>').join('')+'</nav>' : '';
      let html = '<p class="eyebrow">'+dateFromFile(file)+' · Draft</p>';
      let para = [], quote = [], h2Index = 0, seenH1 = false, insertedToc = false, usedIntro = false, inCode = false, code = [];
      function maybeToc(){ if(seenH1 && usedIntro && !insertedToc && toc){ html += toc; insertedToc = true; } }
      function flushPara(){ if(para.length){ html += '<p>'+inline(para.join(' '))+'</p>'; para=[]; maybeToc(); } }
      function flushQuote(){ if(quote.length){ html += '<blockquote><p>'+quote.map(inline).join('<br>')+'</p></blockquote>'; quote=[]; maybeToc(); } }
      function flushCode(){ if(code.length){ html += '<pre><code>'+escapeHtml(code.join('\n'))+'</code></pre>'; code=[]; maybeToc(); } }
      for(const raw of lines){
        if(raw.trim().startsWith('```')){ flushPara(); flushQuote(); if(inCode){ flushCode(); inCode=false; } else { inCode=true; } continue; }
        if(inCode){ code.push(raw); continue; }
        const line = raw.trim();
        if(!line){ flushPara(); flushQuote(); continue; }
        const img = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if(img){ flushPara(); flushQuote(); html += '<figure class="figure"><img src="'+escapeAttr(img[2])+'" alt="'+escapeAttr(img[1])+'"></figure>'; maybeToc(); continue; }
        if(line.startsWith('>')){ flushPara(); quote.push(line.replace(/^>\s?/,'')); continue; }
        flushQuote();
        if(line.startsWith('# ')){ flushPara(); html += '<h1>'+inline(line.slice(2))+'</h1>'; seenH1 = true; document.title = line.slice(2)+' - Lucy Bai'; continue; }
        if(seenH1 && !usedIntro && /^\*[^*]+\*$/.test(line)){ flushPara(); html += '<p class="intro">'+inline(line.replace(/^\*|\*$/g,''))+'</p>'; usedIntro = true; maybeToc(); continue; }
        if(line.startsWith('## ')){ flushPara(); const title=line.slice(3); html += '<h2 id="'+ids[h2Index++]+'">'+inline(title)+'</h2>'; continue; }
        if(line.startsWith('### ')){ flushPara(); html += '<h3>'+inline(line.slice(4))+'</h3>'; continue; }
        if(/^[-*] /.test(line)){ flushPara(); html += '<p>• '+inline(line.slice(2))+'</p>'; continue; }
        para.push(line);
      }
      flushPara(); flushQuote(); flushCode();
      if(!insertedToc && toc) html += toc;
      post.innerHTML = html;
    }

    if(!file || !/^\d{8}-[a-z0-9-]+\.md$/i.test(file)){
      post.innerHTML = '<p class="draft-error">Invalid draft file.</p>';
    } else {
      fetch('/draft/'+encodeURIComponent(file))
        .then(r=>{if(!r.ok) throw new Error('not found'); return r.text();})
        .then(render)
        .catch(()=>{post.innerHTML='<p class="draft-error">Unable to load draft.</p>';});
    }
  </script>
</body>
</html>
