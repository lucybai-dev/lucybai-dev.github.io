<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Preview - Lucy Bai</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/style.css">
  <style>
    .figure { margin: 2rem 0; }
    .figure img { display: block; width: 100%; max-width: 980px; height: auto; border-radius: 24px; }
    .draft-error { border-top:1px solid var(--line); padding-top:20px; color:var(--muted); }
    .version-nav { display:grid; grid-template-columns:112px minmax(0,1fr) 112px; gap:18px; align-items:center; margin:0 0 48px; padding:18px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
    .version-nav.bottom { margin:72px 0 0; }
    .version-button { display:block; color:var(--text); text-decoration:none; font-size:14px; }
    .version-button.next { text-align:right; }
    .version-button:hover { text-decoration:underline; text-underline-offset:4px; }
    .version-button.disabled { color:#aaa; cursor:default; }
    .version-info { min-width:0; text-align:center; }
    .version-count { display:block; color:var(--muted); font-size:11px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px; }
    .version-info strong { display:block; font-size:14px; font-weight:600; }
    .version-description { display:block; color:var(--muted); font-size:13px; line-height:1.45; margin-top:2px; }
    @media(max-width:700px){
      .version-nav { grid-template-columns:74px minmax(0,1fr) 74px; gap:8px; margin-bottom:38px; }
      .version-description { display:none; }
      .version-button { font-size:13px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="logo" href="/">Lucy Bai</a>
      <nav>
        <a href="/writing.html">Notes</a>
        <a href="/projects.html">Projects</a>
      </nav>
    </header>
    <div id="version-nav-top"></div>
    <article id="post"><p>Loading draft…</p></article>
    <div id="version-nav-bottom"></div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    const post = document.getElementById('post');
    const navTop = document.getElementById('version-nav-top');
    const navBottom = document.getElementById('version-nav-bottom');
    const repo = 'lucybai-dev/lucybai-dev.github.io';

    const fallbackManifest = {
      '20260709-research-parking-lot.md': {
        versions: [
          {
            label: '文献专题版',
            description: '保留较完整的四个文献专题、研究问题与实验入口。',
            ref: 'f2a0d5cd04859e1a8b68f530e1601a897bf82117'
          },
          {
            label: '精简工作版',
            description: '只保留能直接指导近期文献、实验与系统设计的内容。',
            ref: 'a10ffdb80a0ec8be81bd4a35c3e1a9e9728aaf6f'
          }
        ]
      }
    };

    function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    function escapeAttr(s){return escapeHtml(s).replace(/"/g,'&quot;');}
    function inline(s){return escapeHtml(s)
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g,'<em>$1</em>')
      .replace(/`([^`]+)`/g,'<code>$1</code>');}
    function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'-').replace(/^-+|-+$/g,'');}
    function dateFromFile(name){
      const m = name.match(/^(\d{4})(\d{2})(\d{2})-/);
      return m ? `${m[1]}.${m[2]}.${m[3]}` : 'Draft';
    }
    function pageHref(page){
      const next = new URLSearchParams(location.search);
      next.set('file', file);
      next.set('page', String(page));
      return '?' + next.toString();
    }
    function versionNav(version, page, total, bottom=false){
      if(total <= 1) return '';
      const previous = page > 1
        ? '<a class="version-button" href="'+escapeAttr(pageHref(page-1))+'">← 上一页</a>'
        : '<span class="version-button disabled">← 上一页</span>';
      const next = page < total
        ? '<a class="version-button next" href="'+escapeAttr(pageHref(page+1))+'">下一页 →</a>'
        : '<span class="version-button next disabled">下一页 →</span>';
      const description = version.description
        ? '<span class="version-description">'+escapeHtml(version.description)+'</span>'
        : '';
      return '<nav class="version-nav'+(bottom?' bottom':'')+'" aria-label="文档版本">'
        + previous
        + '<div class="version-info"><span class="version-count">版本 '+page+' / '+total+'</span><strong>'+escapeHtml(version.label || '未命名版本')+'</strong>'+description+'</div>'
        + next
        + '</nav>';
    }
    function render(md, version){
      const lines = md.split(/\r?\n/);
      const headings = lines.filter(l=>l.trim().startsWith('## ')).map(l=>l.trim().slice(3));
      const used = {};
      const ids = headings.map(h=>{let base=slugify(h)||'section';let id=base;used[base]=(used[base]||0)+1;if(used[base]>1)id=base+'-'+used[base];return id;});
      const toc = headings.length ? '<nav class="toc"><p class="toc-title">Map</p>'+headings.map((h,i)=>'<a href="#'+ids[i]+'">'+inline(h)+'</a>').join('')+'</nav>' : '';
      let html = '<p class="eyebrow">'+dateFromFile(file)+' · '+escapeHtml(version.label || 'Draft')+'</p>';
      let para = [], quote = [], h2Index = 0, seenH1 = false, insertedToc = false, usedIntro = false, inCode = false, code = [];
      function maybeToc(){ if(seenH1 && usedIntro && !insertedToc && toc){ html += toc; insertedToc = true; } }
      function flushPara(){ if(para.length){ html += '<p>'+inline(para.join(' '))+'</p>'; para=[]; maybeToc(); } }
      function flushQuote(){ if(quote.length){ html += '<blockquote><p>'+quote.map(inline).join('<br>')+'</p></blockquote>'; quote=[]; maybeToc(); } }
      function flushCode(){ if(code.length){ html += '<pre><code>'+escapeHtml(code.join('\n'))+'</code></pre>'; code=[]; maybeToc(); } }
      for(const raw of lines){
        if(raw.trim().startsWith('```')){ flushPara(); flushQuote(); if(inCode){ flushCode(); inCode=false; } else { inCode=true; } continue; }
        if(inCode){ code.push(raw); continue; }
        const line = raw.trim();
        if(!line){ flushPara(); flushQuote(); continue; }
        const img = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if(img){ flushPara(); flushQuote(); html += '<figure class="figure"><img src="'+escapeAttr(img[2])+'" alt="'+escapeAttr(img[1])+'"></figure>'; maybeToc(); continue; }
        if(line.startsWith('>')){ flushPara(); quote.push(line.replace(/^>\s?/,'')); continue; }
        flushQuote();
        if(line.startsWith('# ')){ flushPara(); html += '<h1>'+inline(line.slice(2))+'</h1>'; seenH1 = true; document.title = line.slice(2)+' · '+(version.label || 'Draft')+' - Lucy Bai'; continue; }
        if(seenH1 && !usedIntro && /^\*[^*]+\*$/.test(line)){ flushPara(); html += '<p class="intro">'+inline(line.replace(/^\*|\*$/g,''))+'</p>'; usedIntro = true; maybeToc(); continue; }
        if(line.startsWith('## ')){ flushPara(); const title=line.slice(3); html += '<h2 id="'+ids[h2Index++]+'">'+inline(title)+'</h2>'; continue; }
        if(line.startsWith('### ')){ flushPara(); html += '<h3>'+inline(line.slice(4))+'</h3>'; continue; }
        if(/^[-*] /.test(line)){ flushPara(); html += '<p>• '+inline(line.slice(2))+'</p>'; continue; }
        para.push(line);
      }
      flushPara(); flushQuote(); flushCode();
      if(!insertedToc && toc) html += toc;
      post.innerHTML = html;
    }
    function decodeBase64Utf8(content){
      const binary = atob(String(content).replace(/\s/g,''));
      const bytes = Uint8Array.from(binary, c=>c.charCodeAt(0));
      return new TextDecoder('utf-8').decode(bytes);
    }
    async function fetchGithubFile(path, ref){
      const url = 'https://api.github.com/repos/'+repo+'/contents/'+path.split('/').map(encodeURIComponent).join('/')+'?ref='+encodeURIComponent(ref);
      const response = await fetch(url, {
        cache: 'no-store',
        headers: { 'Accept': 'application/vnd.github+json' }
      });
      if(!response.ok) throw new Error('GitHub API '+response.status);
      const data = await response.json();
      if(data.encoding !== 'base64' || !data.content) throw new Error('Unsupported GitHub response');
      return decodeBase64Utf8(data.content);
    }
    async function loadManifest(){
      try {
        const text = await fetchGithubFile('draft/versions.json', 'main');
        const manifest = JSON.parse(text);
        if(manifest[file] && Array.isArray(manifest[file].versions) && manifest[file].versions.length){
          return manifest[file].versions;
        }
      } catch (_) {}
      return fallbackManifest[file] ? fallbackManifest[file].versions : [{label:'当前版本',description:'',ref:'main'}];
    }
    async function loadVersion(version){
      try {
        return await fetchGithubFile('draft/'+file, version.ref);
      } catch (primaryError) {
        const fallbackUrl = 'https://cdn.jsdelivr.net/gh/'+repo+'@'+encodeURIComponent(version.ref)+'/draft/'+encodeURIComponent(file);
        const response = await fetch(fallbackUrl, {cache:'no-store'});
        if(!response.ok) throw primaryError;
        return response.text();
      }
    }
    async function load(){
      if(!file || !/^\d{8}-[a-z0-9-]+\.md$/i.test(file)){
        post.innerHTML = '<p class="draft-error">Invalid draft file.</p>';
        return;
      }
      const versions = await loadManifest();
      const requested = Number(params.get('page'));
      const page = Number.isInteger(requested) && requested >= 1 && requested <= versions.length ? requested : versions.length;
      const version = versions[page-1];
      navTop.innerHTML = versionNav(version, page, versions.length, false);
      navBottom.innerHTML = versionNav(version, page, versions.length, true);
      try {
        render(await loadVersion(version), version);
      } catch (_) {
        post.innerHTML = '<p class="draft-error">Unable to load this draft version.</p>';
      }
    }
    load();
  </script>
</body>
</html>
