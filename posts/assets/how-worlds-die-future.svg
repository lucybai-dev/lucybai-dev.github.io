<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">未来剪枝</title>
  <desc id="desc">如果相信我是真守卫，即使白天推出一个狼，夜里另一个狼仍能刀我；守卫不能连续自守，好人仍然输。</desc>
  <style>.bg{fill:#fafafa}.title{font:700 26px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.sub{font:400 15px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.step{fill:#fff;stroke:#e5e7eb;stroke-width:2}.dead{fill:#fee2e2;stroke:#dc2626;stroke-width:3}.label{font:700 17px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#111827}.small{font:400 13px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#6b7280}.arrow{stroke:#6b7280;stroke-width:3;fill:none;marker-end:url(#arrow)}.x{font:800 22px ui-sans-serif,system-ui,"Noto Sans SC",sans-serif;fill:#991b1b}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker></defs>
  <rect class="bg" width="900" height="300" rx="28"/>
  <text x="50" y="55" class="title">这条世界线死在未来</text>
  <text x="50" y="83" class="sub">它能解释现在，但往后一轮推，好人仍然没有赢面。</text>
  <rect class="step" x="55" y="145" width="145" height="70" rx="20"/>
  <text x="127" y="174" text-anchor="middle" class="label">白天</text><text x="127" y="197" text-anchor="middle" class="small">推出一个狼</text>
  <path class="arrow" d="M205 180 L255 180"/>
  <rect class="step" x="260" y="145" width="145" height="70" rx="20"/>
  <text x="332" y="174" text-anchor="middle" class="label">夜里</text><text x="332" y="197" text-anchor="middle" class="small">剩狼刀我</text>
  <path class="arrow" d="M410 180 L460 180"/>
  <rect class="step" x="465" y="145" width="160" height="70" rx="20"/>
  <text x="545" y="174" text-anchor="middle" class="label">不能连守</text><text x="545" y="197" text-anchor="middle" class="small">我挡不住刀</text>
  <path class="arrow" d="M630 180 L680 180"/>
  <rect class="dead" x="685" y="145" width="160" height="70" rx="20"/>
  <text x="765" y="174" text-anchor="middle" class="label">好人仍然输</text><text x="765" y="197" text-anchor="middle" class="x">×</text>
</svg>
