<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>From DeepSeek’s Cache Hit Rate to Representation Learning - Lucy Bai</title>
  <meta name="description" content="Some notes on representation, structure, and how new structures emerge.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="logo" href="/">Lucy Bai</a>
      <nav>
        <a href="/writing.html">Notes</a>
        <a href="/projects.html">Projects</a>
      </nav>
    </header>
    <article id="post">
      <p class="eyebrow">2026.05.28 · English</p>
      <p>Loading...</p>
    </article>
  </main>
  <script>
    const src = '/posts/20260528-deepseek-cache-representation-en.md';
    const post = document.getElementById('post');
    function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    function inline(s){return escapeHtml(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');}
    function render(md){
      const lines = md.split(/\r?\n/);
      let html = '<p class="eyebrow">2026.05.28 · English · <a href="/posts/deepseek-cache-representation-zh.html">中文</a></p>';
      let para = [], quote = [];
      function flushPara(){ if(para.length){ html += '<p>'+inline(para.join(' '))+'</p>'; para=[]; } }
      function flushQuote(){ if(quote.length){ html += '<blockquote><p>'+inline(quote.join('<br>'))+'</p></blockquote>'; quote=[]; } }
      for(const raw of lines){
        const line = raw.trim();
        if(!line){ flushPara(); flushQuote(); continue; }
        if(line.startsWith('>')){ flushPara(); quote.push(line.replace(/^>\s?/,'')); continue; }
        flushQuote();
        if(line.startsWith('# ')){ flushPara(); html += '<h1>'+inline(line.slice(2))+'</h1>'; continue; }
        if(line.startsWith('## ')){ flushPara(); html += '<h2>'+inline(line.slice(3))+'</h2>'; continue; }
        para.push(line);
      }
      flushPara(); flushQuote();
      post.innerHTML = html;
    }
    fetch(src).then(r=>r.text()).then(render).catch(()=>{post.innerHTML='<p>Unable to load post.</p>';});
  </script>
</body>
</html>
