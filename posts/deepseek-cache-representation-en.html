<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="logo" href="/">Lucy Bai</a>
      <nav>
        <a href="/writing.html">Notes</a>
        <a href="/projects.html">Projects</a>
      </nav>
    </header>
    <article id="post"></article>
    <noscript>
      <article>
        <p class="eyebrow">2026.05.28 · English</p>
        <h1>From DeepSeek’s Cache Hit Rate to Representation Learning</h1>
        <p class="intro">This article requires JavaScript to render from the Markdown source.</p>
        <p><a href="/posts/20260528-deepseek-cache-representation-en.md">Read the Markdown source</a></p>
      </article>
    </noscript>
  </main>
  <script>
    const src = '/posts/20260528-deepseek-cache-representation-en.md';
    const post = document.getElementById('post');
    const mapTitle = 'Map';
    const langSwitch = '<a href="/posts/deepseek-cache-representation-zh.html">中文</a>';
    function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    function inline(s){return escapeHtml(s).replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');}
    function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g,'-').replace(/^-+|-+$/g,'');}
    function mapLabel(h){return h.replace(/^From /,'').replace(/ to /,' → ').replace(/^Back to the Original Question$/,'Back to the Question');}
    function render(md){
      const lines = md.split(/\r?\n/);
      const headings = lines.filter(l=>l.trim().startsWith('## ')).map(l=>l.trim().slice(3));
      const used = {};
      const ids = headings.map(h=>{let base=slugify(h)||'section';let id=base;used[base]=(used[base]||0)+1;if(used[base]>1)id=base+'-'+used[base];return id;});
      const toc = '<nav class="toc"><p class="toc-title">'+mapTitle+'</p>'+headings.map((h,i)=>'<a href="#'+ids[i]+'">'+inline(mapLabel(h))+'</a>').join('')+'</nav>';
      let html = '<p class="eyebrow">2026.05.28 · English · '+langSwitch+'</p>';
      let para = [], quote = [], h2Index = 0, seenH1 = false, insertedToc = false;
      function maybeToc(){ if(seenH1 && !insertedToc){ html += toc; insertedToc = true; } }
      function flushPara(){ if(para.length){ html += '<p>'+inline(para.join(' '))+'</p>'; para=[]; maybeToc(); } }
      function flushQuote(){ if(quote.length){ html += '<blockquote><p>'+inline(quote.join('<br>'))+'</p></blockquote>'; quote=[]; maybeToc(); } }
      for(const raw of lines){
        const line = raw.trim();
        if(!line){ flushPara(); flushQuote(); continue; }
        if(line.startsWith('>')){ flushPara(); quote.push(line.replace(/^>\s?/,'')); continue; }
        flushQuote();
        if(line.startsWith('# ')){ flushPara(); html += '<h1>'+inline(line.slice(2))+'</h1>'; seenH1 = true; continue; }
        if(line.startsWith('## ')){ flushPara(); const title=line.slice(3); html += '<h2 id="'+ids[h2Index++]+'">'+inline(title)+'</h2>'; continue; }
        para.push(line);
      }
      flushPara(); flushQuote();
      if(!insertedToc) html += toc;
      post.innerHTML = html;
    }
    fetch(src).then(r=>r.text()).then(render).catch(()=>{post.innerHTML='<p>Unable to load post.</p>';});
  </script>
</body>
</html>
